<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calibra — Bet on Edge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0a0a0a;color:#f0ede8;overflow-x:hidden}
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.5}
.wrap{max-width:800px;margin:0 auto;padding:0 28px;position:relative;z-index:1}
nav{display:flex;align-items:center;justify-content:space-between;padding:32px 0 0;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.4px;flex-shrink:0}

.nav-right{display:flex;align-items:center;gap:12px}
.lang-select{background:#111;border:1px solid #1e1e1e;color:#888;font-family:'DM Mono',monospace;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;outline:none;transition:all 0.2s}
.lang-select:hover{border-color:#333;color:#f0ede8}
.lang-select option{background:#111}
.lang-auto-badge{font-family:'DM Mono',monospace;font-size:9px;color:#3a5a10;background:#0d1a00;border:1px solid #2a4010;padding:2px 8px;border-radius:20px;letter-spacing:0.08em;white-space:nowrap}
.btn-nav{font-size:13px;font-family:'Outfit',sans-serif;background:#c8f55a;color:#0a0a0a;border:none;padding:8px 18px;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-nav:hover{background:#d4f870}
.hero{padding:100px 0 80px;text-align:center}
.hero-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;color:#5a8a20;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:24px;margin-top:8px}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(38px,6vw,68px);line-height:1.05;letter-spacing:-2px;margin-bottom:24px}
.hero h1 em{font-style:italic;color:#c8f55a}
.hero h1 .muted{color:#333}
.hero-sub{font-size:17px;color:#666;font-weight:300;line-height:1.7;max-width:480px;margin:0 auto 48px}
.hero-ctas{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.btn-primary{padding:14px 32px;background:#c8f55a;color:#0a0a0a;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary:hover{background:#d4f870;transform:translateY(-1px)}
.btn-ghost{padding:14px 32px;background:transparent;color:#555;border:1px solid #222;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{color:#f0ede8;border-color:#444}
.hero-note{font-family:'DM Mono',monospace;font-size:11px;color:#333;margin-top:20px;letter-spacing:0.05em}
.section{padding:80px 0}
.section-tag{font-family:'DM Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px}
.section h2{font-family:'DM Serif Display',serif;font-size:clamp(28px,4vw,42px);letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
.section h2 em{font-style:italic;color:#c8f55a}
.section-sub{font-size:15px;color:#555;font-weight:300;line-height:1.7;max-width:460px;margin-bottom:48px}

/* MODULES CLICAVEIS */
.modules{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.module{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:28px;position:relative;cursor:pointer;transition:all 0.25s}
.module:hover{border-color:#3a3a3a;transform:translateY(-2px)}
.module.premium{border-color:#2a3a10;background:#0d1500}
.module.premium:hover{border-color:#5a8a20;transform:translateY(-2px)}
.module-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;color:#444}
.module.premium .module-tag{color:#5a8a20}
.module-icon{width:40px;height:40px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:18px}
.module.premium .module-icon{background:#1a2a00}
.module h3{font-size:18px;font-weight:500;margin-bottom:10px;letter-spacing:-0.3px}
.module p{font-size:13px;color:#555;line-height:1.7}
.module.premium p{color:#5a7a30}
.module-badge{position:absolute;top:20px;right:20px;font-family:'DM Mono',monospace;font-size:10px;background:#c8f55a;color:#0a0a0a;padding:3px 10px;border-radius:20px;font-weight:500}
.module-note{margin-top:16px;padding-top:14px;border-top:1px solid #1a1a1a;font-family:'DM Mono',monospace;font-size:11px;color:#333;line-height:1.6}
.module-note strong{color:#444}
.module-cta{margin-top:20px;padding-top:16px;border-top:1px solid #1a1a1a;font-family:'DM Mono',monospace;font-size:11px;color:#3a3a3a;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.module:hover .module-cta{color:#888}
.module.premium .module-cta{color:#2a4a10}
.module.premium:hover .module-cta{color:#5a8a20}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.visible{display:flex}
.modal{background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:36px;max-width:600px;width:100%;position:relative;max-height:90vh;overflow-y:auto}
.modal.premium{border-color:#2a3a10;background:#0d1500}
.modal-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:#444;font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all 0.2s}
.modal-close:hover{color:#f0ede8;background:#1a1a1a}
.modal-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#444;margin-bottom:20px}
.modal.premium .modal-tag{color:#5a8a20}
.modal h3{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-0.5px;margin-bottom:16px}
.modal-desc{font-size:15px;color:#666;line-height:1.7;margin-bottom:28px}
.modal-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.modal-field label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;color:#f0ede8;font-family:'Outfit',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.2s;resize:none}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:#333}
.modal-field input::placeholder,.modal-field textarea::placeholder{color:#2a2a2a}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btn{width:100%;padding:14px;background:#c8f55a;color:#0a0a0a;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.modal-btn:hover{background:#d4f870}
.modal-btn:disabled{background:#1a1a1a;color:#333;cursor:not-allowed}
.modal-result{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:12px;padding:20px;margin-top:20px;display:none}
.modal-result.visible{display:block}
.modal-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #1a1a1a}
.modal-result-title{font-family:'DM Mono',monospace;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.1em}
.ev-badge{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid}
.ev-pos{background:#0f2a00;color:#c8f55a;border-color:#3a5a10}
.ev-neg{background:#2a0000;color:#f55a5a;border-color:#5a1010}
.ev-neu{background:#1a1a00;color:#f5d05a;border-color:#4a3a10}
.modal-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.modal-metric{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px;text-align:center}
.modal-metric-label{font-family:'DM Mono',monospace;font-size:9px;color:#333;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.modal-metric-value{font-size:18px;font-weight:500;color:#f0ede8}
.modal-metric-value.green{color:#c8f55a}
.modal-metric-value.red{color:#f55a5a}
.modal-text{font-size:13px;color:#666;line-height:1.7}
.modal-text strong{color:#aaa;font-weight:400}
.modal-divider{height:1px;background:#1a1a1a;margin:14px 0}
.modal-loading{display:none;text-align:center;padding:24px;color:#333;font-family:'DM Mono',monospace;font-size:11px}
.modal-loading.visible{display:block}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #1e1e1e;border-top-color:#c8f55a;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCANNER MODAL */
.scanner-prompt-wrap{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:18px;margin-bottom:16px;transition:border-color 0.2s}
.scanner-prompt-wrap:focus-within{border-color:#2a3a10}
.scanner-prompt-label{font-family:'DM Mono',monospace;font-size:10px;color:#333;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.scanner-prompt-wrap textarea{width:100%;background:transparent;border:none;outline:none;color:#f0ede8;font-family:'Outfit',sans-serif;font-size:15px;line-height:1.7;resize:none;min-height:64px}
.scanner-prompt-wrap textarea::placeholder{color:#222;font-style:italic}
.scanner-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.scanner-sug{font-size:11px;color:#444;border:1px solid #1e1e1e;border-radius:20px;padding:4px 12px;cursor:pointer;transition:all 0.2s;font-family:'DM Mono',monospace}
.scanner-sug:hover{color:#c8f55a;border-color:#2a3a10}
.opp-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.opp-card{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:16px;transition:border-color 0.2s}
.opp-card.top{border-color:#2a3a10;background:#0a1000}
.opp-top-label{font-family:'DM Mono',monospace;font-size:9px;color:#5a8a20;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.opp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.opp-event{font-size:14px;font-weight:500;color:#f0ede8}
.opp-sub{font-size:11px;color:#444;margin-top:2px}
.opp-edge{font-family:'DM Mono',monospace;font-size:13px;color:#c8f55a;font-weight:500;white-space:nowrap}
.opp-resumo{font-size:12px;color:#666;line-height:1.6;margin-bottom:10px}
.opp-details{display:flex;gap:16px;padding-top:10px;border-top:1px solid #1a1a1a;font-family:'DM Mono',monospace;font-size:10px;color:#333}
.opp-details strong{color:#555}
.conf-alta{color:#c8f55a}
.conf-media{color:#f5d05a}
.conf-baixa{color:#555}

/* PRICING */
.pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:48px}
.plan{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:24px;position:relative}
.plan.featured{border-color:#3a5a10;background:#0d1500}
.plan.decoy{border-color:#2a2010;background:#0d0a00}
.popular-tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:10px;background:#c8f55a;color:#0a0a0a;padding:3px 12px;border-radius:20px;font-weight:500;white-space:nowrap}
.plan-label{font-family:'DM Mono',monospace;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px}
.plan.featured .plan-label{color:#5a8a20}
.plan.decoy .plan-label{color:#7a6020}
.plan-price .amount{font-family:'DM Serif Display',serif;font-size:38px;letter-spacing:-2px;color:#f0ede8}
.plan-price .period{font-size:12px;color:#444;margin-left:3px}
.plan-desc{font-size:12px;color:#444;margin-bottom:20px;line-height:1.6;margin-top:6px}
.plan.featured .plan-desc{color:#5a7a30}
.plan.decoy .plan-desc{color:#7a6030}
.plan-features{list-style:none;margin-bottom:24px}
.plan-features li{font-size:12px;color:#555;padding:6px 0;border-bottom:1px solid #111;display:flex;align-items:center;gap:8px}
.plan-features li:last-child{border-bottom:none}
.feat-dot{width:4px;height:4px;border-radius:50%;background:#222;flex-shrink:0}
.plan.featured .feat-dot{background:#5a8a20}
.plan.featured .plan-features li{color:#5a7a40}
.plan.decoy .feat-dot{background:#5a4a10}
.plan.decoy .plan-features li{color:#7a6030}
.btn-plan{width:100%;padding:11px;border:1px solid #222;border-radius:8px;background:transparent;color:#444;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn-plan:hover{border-color:#444;color:#f0ede8}
.btn-plan-primary{width:100%;padding:11px;border:none;border-radius:8px;background:#c8f55a;color:#0a0a0a;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-plan-primary:hover{background:#d4f870}
.btn-plan-gold{width:100%;padding:11px;border:1px solid #5a4010;border-radius:8px;background:transparent;color:#8a6020;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn-plan-gold:hover{background:#1a1000;color:#c8a040}
.cancel-note{text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:#2a2a2a;margin-top:14px;letter-spacing:0.05em}
.fomo-box{background:#0a0f00;border:1px solid #1e2e08;border-radius:12px;padding:20px 24px;margin-top:20px;display:flex;align-items:center;gap:16px}
.fomo-icon{width:36px;height:36px;border-radius:50%;background:#1a2a00;border:1px solid #2a4010;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fomo-text{font-size:13px;color:#5a7a30;line-height:1.6}
.fomo-text strong{color:#8ab840}

/* SUPPORT */
.support-box{background:#111;border:1px solid #1e1e1e;border-radius:16px;overflow:hidden;margin-top:48px}
.support-header{padding:20px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px}
.support-dot{width:8px;height:8px;border-radius:50%;background:#c8f55a}
.support-title{font-family:'DM Mono',monospace;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em}
.support-status{font-family:'DM Mono',monospace;font-size:10px;color:#3a5a10;margin-left:auto}
.chat-area{padding:20px 24px;min-height:160px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:82%;font-size:14px;line-height:1.6;padding:12px 16px;border-radius:12px}
.msg.ai{background:#0f0f0f;border:1px solid #1e1e1e;color:#888;align-self:flex-start;border-radius:0 12px 12px 12px}
.msg.ai strong{color:#c8f55a;font-weight:400}
.msg.user{background:#0d1500;border:1px solid #2a3a10;color:#8ab840;align-self:flex-end;border-radius:12px 0 12px 12px}
.typing{display:none;align-items:center;gap:6px;padding:0 24px 16px}
.typing.visible{display:flex}
.typing span{font-size:12px;color:#333;font-family:'DM Mono',monospace}
.dot-anim{display:flex;gap:4px}
.dot-anim div{width:4px;height:4px;border-radius:50%;background:#333;animation:bounce 1.2s infinite}
.dot-anim div:nth-child(2){animation-delay:0.2s}
.dot-anim div:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.support-input-wrap{border-top:1px solid #1a1a1a;padding:16px 24px;display:flex;gap:12px;align-items:flex-end}
.support-input{flex:1;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;color:#f0ede8;font-family:'Outfit',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:none;min-height:40px;max-height:120px;transition:border-color 0.2s;line-height:1.5}
.support-input:focus{border-color:#2a3a10}
.support-input::placeholder{color:#2a2a2a}
.btn-send{padding:10px 18px;background:#c8f55a;color:#0a0a0a;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;height:40px}
.btn-send:hover{background:#d4f870}
.btn-send:disabled{background:#1a1a1a;color:#333;cursor:not-allowed}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 16px}
.chip{font-size:12px;color:#444;border:1px solid #1e1e1e;border-radius:20px;padding:5px 12px;cursor:pointer;transition:all 0.2s;font-family:'DM Mono',monospace}
.chip:hover{color:#c8f55a;border-color:#2a3a10}

.cta-section{padding:100px 0;text-align:center}
.cta-section h2{font-family:'DM Serif Display',serif;font-size:clamp(32px,5vw,52px);letter-spacing:-1.5px;margin-bottom:20px;line-height:1.1}
.cta-section h2 em{font-style:italic;color:#c8f55a}
.cta-section p{font-size:16px;color:#555;margin-bottom:40px;font-weight:300}

footer{border-top:1px solid #111;padding:28px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-logo{font-family:'DM Serif Display',serif;font-size:20px}
.footer-tagline{font-family:'DM Mono',monospace;font-size:10px;color:#3a5a10;letter-spacing:0.08em;text-transform:uppercase;margin-top:6px}
.footer
.footer-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;max-width:420px}
.footer-copy{font-family:'DM Mono',monospace;font-size:11px;color:#2a2a2a;letter-spacing:0.05em}
.footer-disclaimer{font-family:'DM Mono',monospace;font-size:10px;color:#222;text-align:right;line-height:1.6}
.footer-quant{font-family:'DM Mono',monospace;font-size:10px;color:#2a3a10;text-align:right;line-height:1.6;border-top:1px solid #1a1a1a;padding-top:8px;margin-top:4px}

@media(max-width:600px){.modules{grid-template-columns:1fr}.pricing{grid-template-columns:1fr}.modal-row{grid-template-columns:1fr}.modal-metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="noise"></div>

<!-- MODAL MÓDULO 1 -->
<div class="modal-overlay" id="modal1">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal1')">✕</button>
    <div class="modal-tag" data-i18n="mod1_tag"></div>
    <h3 data-i18n="mod1_title"></h3>
    <p class="modal-desc" data-i18n="mod1_desc"></p>
    <div class="modal-fields">
      <div class="modal-field">
        <label data-i18n="field_event"></label>
        <input type="text" id="m1-evento" data-i18n-placeholder="ph_event" />
      </div>
      <div class="modal-field">
        <label data-i18n="field_market"></label>
        <input type="text" id="m1-mercado" data-i18n-placeholder="ph_market" />
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label data-i18n="field_odd"></label>
          <input type="number" id="m1-odd" placeholder="2.10" step="0.01" min="1" />
        </div>
        <div class="modal-field">
          <label data-i18n="field_sport"></label>
          <select id="m1-esporte">
            <option value="futebol" data-i18n="sport_football"></option>
            <option value="basquete" data-i18n="sport_basketball"></option>
            <option value="tenis" data-i18n="sport_tennis"></option>
            <option value="mma">MMA / UFC</option>
            <option value="outro" data-i18n="sport_other"></option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label data-i18n="field_context"></label>
        <textarea id="m1-contexto" rows="2" data-i18n-placeholder="ph_context"></textarea>
      </div>
    </div>
    <button class="modal-btn" id="m1-btn" onclick="analisarAposta()"><span data-i18n="btn_analyse"></span></button>
    <div class="modal-loading" id="m1-loading"><div class="spinner"></div><br><span data-i18n="loading_text"></span></div>
    <div class="modal-result" id="m1-result">
      <div class="modal-result-header">
        <div class="modal-result-title">Calibra</div>
        <div class="ev-badge" id="m1-ev-badge">—</div>

let currentLang='en';

function detectLang(){const nav=navigator.language||'en';const code=nav.toLowerCase().split('-')[0];const map={pt:'pt',en:'en',es:'es',fr:'fr',de:'de',it:'it'};return map[code]||'en';}

function setLang(lang,manual=false){
  currentLang=lang;
  if(manual)document.getElementById('auto-badge').style.display='none';
  const t=i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n');if(t[key]!==undefined)el.innerHTML=t[key];});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const key=el.getAttribute('data-i18n-placeholder');if(t[key])el.placeholder=t[key];});
  document.querySelectorAll('select option[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n');if(t[key])el.textContent=t[key];});
  document.getElementById('price-free').textContent=t.prices.free;
  document.getElementById('price-pro').textContent=t.prices.pro;
  document.getElementById('price-elite').textContent=t.prices.elite;
  document.getElementById('support-input').placeholder=t.support_placeholder;
  document.getElementById('chat-area').innerHTML=`<div class="msg ai">${t.support_init}</div>`;
  document.getElementById('chip1').textContent=t.chip1;
  document.getElementById('chip2').textContent=t.chip2;
  document.getElementById('chip3').textContent=t.chip3;
  document.getElementById('chip4').textContent=t.chip4;
  document.getElementById('lang-select').value=lang;
  document.getElementById('chips').style.display='flex';
  const sugsEl=document.getElementById('scanner-sugs');
  sugsEl.innerHTML='';
  (t.scanner_sugs||[]).forEach(s=>{const d=document.createElement('div');d.className='scanner-sug';d.textContent=s;d.onclick=()=>{document.getElementById('m2-prompt').value=s;};sugsEl.appendChild(d);});
}

function openModal(id){document.getElementById(id).classList.add('visible');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('visible');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);}));

async function analisarAposta(){
  const evento=document.getElementById('m1-evento').value.trim();
  const mercado=document.getElementById('m1-mercado').value.trim();
  const odd=parseFloat(document.getElementById('m1-odd').value);
  const esporte=document.getElementById('m1-esporte').value;
  const contexto=document.getElementById('m1-contexto').value.trim();
  if(!evento||!mercado||!odd||odd<1)return;
  const btn=document.getElementById('m1-btn');
  btn.disabled=true;
  document.getElementById('m1-loading').classList.add('visible');
  document.getElementById('m1-result').classList.remove('visible');
  const probImplicita=(1/odd*100).toFixed(1);
  const t=i18n[currentLang];
  const prompt=`You are a quantitative sports betting analyst. Analyse this bet rigorously.
EVENT: ${evento}
MARKET: ${mercado}
SPORT: ${esporte}
DECIMAL ODDS: ${odd}
IMPLIED PROBABILITY: ${probImplicita}%
CONTEXT: ${contexto||'None'}
Respond ONLY in valid JSON, no markdown:
{"prob_estimada":number,"ev_percentual":number,"veredicto":"POSITIVO"|"NEGATIVO"|"NEUTRO","analise":"3-4 sentences on key probability factors","sizing":"1-2 sentences on Half-Kelly stake recommendation (max 5% for positive EV, 0% for negative)","riscos":"1-2 sentences on main risks"}`;
  try{
    const res=await fetch('https://calibra-api.pedrogirao10.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const r=JSON.parse(text.replace(/```json|```/g,'').trim());
    const badge=document.getElementById('m1-ev-badge');
    const evVal=document.getElementById('m1-ev-val');
    badge.className='ev-badge';
    if(r.veredicto==='POSITIVO'){badge.classList.add('ev-pos');badge.textContent=t.ev_pos;evVal.className='modal-metric-value green';}
    else if(r.veredicto==='NEGATIVO'){badge.classList.add('ev-neg');badge.textContent=t.ev_neg;evVal.className='modal-metric-value red';}
    else{badge.classList.add('ev-neu');badge.textContent=t.ev_neu;evVal.className='modal-metric-value';}
    document.getElementById('m1-prob-imp').textContent=probImplicita+'%';
    document.getElementById('m1-prob-est').textContent=r.prob_estimada.toFixed(1)+'%';
    evVal.textContent=(r.ev_percentual>=0?'+':'')+r.ev_percentual.toFixed(1)+'%';
    document.getElementById('m1-text').innerHTML=`<strong>${t.metric_ev}:</strong> ${r.analise}<br><br><strong>Riscos:</strong> ${r.riscos}`;
    document.getElementById('m1-sizing').innerHTML=`<strong>Sizing:</strong> ${r.sizing}`;
    document.getElementById('m1-result').classList.add('visible');
  }catch(e){console.error(e);}
  finally{btn.disabled=false;document.getElementById('m1-loading').classList.remove('visible');}
}

  const apiPrompt=`You are an elite sports betting EV scanner. User request: "${prompt}"

[{"evento":"Team A vs Team B","competicao":"League","mercado":"bet description","odd_mercado":number,"prob_estimada":number,"edge":number,"confianca":"ALTA"|"MEDIA"|"BAIXA","resumo":"2 sentences explaining the edge","top":true/false}]`;

    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const opps=JSON.parse(text.replace(/```json|```/g,'').trim());
    const container=document.getElementById('m2-results');
    opps.forEach(opp=>{
      const confClass=opp.confianca==='ALTA'?'conf-alta':opp.confianca==='MEDIA'?'conf-media':'conf-baixa';
      const div=document.createElement('div');
      div.className=opp.top?'opp-card top':'opp-card';
      div.innerHTML=`${opp.top?'<div class="opp-top-label">↑ best opportunity</div>':''}<div class="opp-header"><div><div class="opp-event">${opp.evento}</div><div class="opp-sub">${opp.competicao} · ${opp.mercado}</div></div><div class="opp-edge">+${opp.edge.toFixed(1)}%</div></div><div class="opp-resumo">${opp.resumo}</div><div class="opp-details"><span><strong>Odd:</strong> ${opp.odd_mercado}</span><span><strong>Prob:</strong> ${opp.prob_estimada.toFixed(0)}%</span><span class="${confClass}"><strong>Conf:</strong> ${opp.confianca}</span></div>`;
      container.appendChild(div);
    });
  }catch(e){console.error(e);}
  finally{btn.disabled=false;document.getElementById('m2-loading').classList.remove('visible');}
}

function sendChipKey(key){document.getElementById('support-input').value=i18n[currentLang][key];sendMessage();}
async function sendMessage(){
  const input=document.getElementById('support-input');
  const text=input.value.trim();
  if(!text)return;
  addMessage(text,'user');input.value='';
  document.getElementById('chips').style.display='none';
  const btn=document.getElementById('btn-send');btn.disabled=true;
  document.getElementById('typing').classList.add('visible');scrollChat();
  try{
    const res=await fetch('https://calibra-api.pedrogirao10.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT[currentLang]||SYSTEM_PROMPT.en,messages:[{role:'user',content:text}]})});
    const data=await res.json();
    const reply=data.content.map(i=>i.text||'').join('');
    document.getElementById('typing').classList.remove('visible');
    addMessage(reply,'ai');
  }catch{document.getElementById('typing').classList.remove('visible');addMessage('Error.','ai');}
  finally{btn.disabled=false;scrollChat();}
}
function addMessage(text,type){const area=document.getElementById('chat-area');const div=document.createElement('div');div.className=`msg ${type}`;div.textContent=text;area.appendChild(div);scrollChat();}
function scrollChat(){document.getElementById('chat-area').scrollTop=9999;}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
setLang(detectLang());
</script>
